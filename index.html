<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Bingo Card Mobile</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e3a8a;
      --panel: rgba(255,255,255,0.12);
      --panel-border: rgba(255,255,255,0.22);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #fbbf24;
      --accent-2: #38bdf8;
      --cell: rgba(255,255,255,0.94);
      --cell-text: #0f172a;
      --marked: linear-gradient(135deg, #f59e0b, #ef4444);
      --free: linear-gradient(135deg, #22c55e, #16a34a);
      --shadow: 0 18px 40px rgba(0,0,0,0.28);
      --radius: 22px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(56,189,248,0.28), transparent 28%),
        radial-gradient(circle at bottom left, rgba(251,191,36,0.22), transparent 24%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      overflow: hidden;
    }

    .app {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
      padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(20px, 5vw, 28px);
      line-height: 1.05;
      letter-spacing: 0.2px;
    }

    .brand p {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .badge {
      flex: 0 0 auto;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .badge .big { font-size: 18px; font-weight: 800; color: var(--accent); }
    .badge .small { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .primary {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white;
    }

    .secondary {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(14px);
    }

    .card-wrap {
      min-height: 0;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 780px;
      display: grid;
      grid-template-rows: auto 1fr;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .header-row, .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding: 10px;
    }

    .header-cell {
      text-align: center;
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 900;
      padding: 10px 0;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
      border: 1px solid rgba(255,255,255,0.16);
      letter-spacing: 3px;
    }

    .grid {
      align-content: stretch;
      grid-auto-rows: 1fr;
      min-height: 0;
      padding-top: 0;
    }

    .cell {
      border: 0;
      border-radius: 18px;
      background: var(--cell);
      color: var(--cell-text);
      font-weight: 900;
      font-size: clamp(18px, 5vw, 34px);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      user-select: none;
      transition: transform .14s ease, box-shadow .14s ease, opacity .14s ease;
      box-shadow: inset 0 -4px 0 rgba(15,23,42,0.08);
    }

    .cell:active { transform: scale(.97); }
    .cell.marked {
      color: white;
      background: var(--marked);
      box-shadow: 0 10px 20px rgba(239,68,68,.3), inset 0 0 0 2px rgba(255,255,255,.18);
    }

    .cell.free {
      color: white;
      background: var(--free);
      font-size: clamp(14px, 4vw, 24px);
      letter-spacing: 1px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      padding: 0 4px;
      flex-wrap: wrap;
    }

    .legend {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .dot {
      width: 12px; height: 12px; border-radius: 999px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      display: inline-block;
    }

    .dot.free { background: linear-gradient(135deg, #22c55e, #16a34a); }

    .win-banner {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(2, 6, 23, 0.68);
      backdrop-filter: blur(10px);
      z-index: 20;
      padding: 20px;
    }

    .win-box {
      width: min(92vw, 420px);
      background: linear-gradient(160deg, rgba(30,58,138,0.96), rgba(15,23,42,0.96));
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 26px 20px;
      text-align: center;
    }

    .win-box h2 { margin: 0; font-size: 36px; }
    .win-box p { color: var(--muted); margin: 10px 0 20px; }

    @media (min-width: 768px) {
      .app { gap: 16px; padding: 20px; }
      .controls { grid-template-columns: 220px 220px; justify-content: center; }
      .header-row, .grid { gap: 10px; padding: 14px; }
      .grid { padding-top: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <h1>17 ปี สผอ.สส.ทหาร</h1>
        <img src="logo.png" style="width:80px;margin-top:10px;">
        <p>แตะเลขบนการ์ดได้ทันที • เต็มจอมือถือ • พร้อมใช้งานในงานจริง</p>
      </div>
      <div class="badge">
        <div class="big" id="markCount">1</div>
        <div class="small">แต้มที่เลือก</div>
      </div>
    </div>

    <div class="controls">
      <button class="primary" id="newCardBtn">สุ่มการ์ดใหม่</button>
      <button class="secondary" id="resetBtn">ล้างเครื่องหมาย</button>
    </div>

    <div class="card-wrap">
      <div class="card">
        <div class="header-row">
          <div class="header-cell">B</div>
          <div class="header-cell">I</div>
          <div class="header-cell">N</div>
          <div class="header-cell">G</div>
          <div class="header-cell">O</div>
        </div>
        <div class="grid" id="grid"></div>
      </div>
    </div>

    <div class="footer">
      <div class="legend"><span class="dot"></span> กดแล้ว <span class="dot free"></span> FREE</div>
      <div id="statusText">พร้อมเล่น</div>
    </div>
  </div>

  <div class="win-banner" id="winBanner">
    <div class="win-box">
      <h2>🎉 BINGO</h2>
      <p id="winText">คุณได้ครบ 1 แนวแล้ว ตรวจสอบกับผู้ควบคุมเกมได้เลย</p>
      <button class="primary" id="closeWinBtn">ปิดหน้าต่าง</button>
    </div>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const markCount = document.getElementById('markCount');
    const statusText = document.getElementById('statusText');
    const winBanner = document.getElementById('winBanner');
    const winText = document.getElementById('winText');

    const ranges = [
      [1, 15],
      [16, 30],
      [31, 45],
      [46, 60],
      [61, 75]
    ];

    let cells = [];

    function sampleRange(min, max, count) {
      const nums = [];
      for (let i = min; i <= max; i++) nums.push(i);
      for (let i = nums.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [nums[i], nums[j]] = [nums[j], nums[i]];
      }
      return nums.slice(0, count);
    }

    function buildCard() {
      grid.innerHTML = '';
      cells = [];
      const cols = ranges.map(([min, max]) => sampleRange(min, max, 5));

      for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 5; col++) {
          const btn = document.createElement('button');
          btn.className = 'cell';
          btn.type = 'button';
          btn.dataset.row = row;
          btn.dataset.col = col;

          if (row === 2 && col === 2) {
            btn.textContent = 'FREE';
            btn.classList.add('free', 'marked');
            btn.dataset.marked = 'true';
          } else {
            btn.textContent = cols[col][row];
            btn.dataset.marked = 'false';
          }

          btn.addEventListener('click', () => toggleCell(btn));
          grid.appendChild(btn);
          cells.push(btn);
        }
      }
      updateCounters();
      statusText.textContent = 'สุ่มการ์ดใหม่แล้ว';
    }

    function toggleCell(btn) {
      const isMarked = btn.dataset.marked === 'true';
      btn.dataset.marked = isMarked ? 'false' : 'true';
      btn.classList.toggle('marked', !isMarked);
      updateCounters();

      const bingoType = checkBingo();
      if (bingoType) {
        winText.textContent = `คุณได้ Bingo แบบ ${bingoType} แล้ว ตรวจสอบกับผู้ควบคุมเกมได้เลย`;
        winBanner.style.display = 'flex';
        statusText.textContent = `พบ Bingo แบบ ${bingoType}`;
      }
    }

    function resetMarks() {
      cells.forEach(btn => {
        const isFree = btn.classList.contains('free');
        btn.dataset.marked = isFree ? 'true' : 'false';
        btn.classList.toggle('marked', isFree);
      });
      updateCounters();
      statusText.textContent = 'ล้างเครื่องหมายแล้ว';
    }

    function updateCounters() {
      const count = cells.filter(c => c.dataset.marked === 'true').length;
      markCount.textContent = count;
    }

    function markedAt(row, col) {
      return cells.find(c => +c.dataset.row === row && +c.dataset.col === col)?.dataset.marked === 'true';
    }

    function checkBingo() {
      for (let r = 0; r < 5; r++) {
        if ([0,1,2,3,4].every(c => markedAt(r, c))) return `แนวนอน แถวที่ ${r + 1}`;
      }

      for (let c = 0; c < 5; c++) {
        if ([0,1,2,3,4].every(r => markedAt(r, c))) return `แนวตั้ง คอลัมน์ ${['B','I','N','G','O'][c]}`;
      }

      if ([0,1,2,3,4].every(i => markedAt(i, i))) {
        return 'แนวทแยง ซ้ายบนไปขวาล่าง';
      }

      if ([0,1,2,3,4].every(i => markedAt(i, 4 - i))) {
        return 'แนวทแยง ขวาบนไปซ้ายล่าง';
      }

      const outerCorners = [
        [0,0], [0,4], [4,0], [4,4]
      ];
      if (outerCorners.every(([r,c]) => markedAt(r,c))) {
        return 'สี่มุมนอก';
      }

      const innerCorners = [
        [1,1], [1,3], [3,1], [3,3]
      ];
      if (innerCorners.every(([r,c]) => markedAt(r,c))) {
        return 'สี่มุมใน';
      }

      return null;
    }

    document.getElementById('newCardBtn').addEventListener('click', buildCard);
    document.getElementById('resetBtn').addEventListener('click', resetMarks);
    document.getElementById('closeWinBtn').addEventListener('click', () => {
      winBanner.style.display = 'none';
    });

    buildCard();
  </script>
</body>
</html>
