<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Bingo Card Mobile</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e3a8a;
      --panel: rgba(255,255,255,0.12);
      --panel-border: rgba(255,255,255,0.22);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #fbbf24;
      --cell: rgba(255,255,255,0.94);
      --cell-text: #0f172a;
      --marked: linear-gradient(135deg, #f59e0b, #ef4444);
      --free: linear-gradient(135deg, #22c55e, #16a34a);
      --shadow: 0 18px 40px rgba(0,0,0,0.28);
      --radius: 22px;
      --chip: rgba(255,255,255,0.14);
      --chip-border: rgba(255,255,255,0.18);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; }

    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(56,189,248,0.28), transparent 28%),
        radial-gradient(circle at bottom left, rgba(251,191,36,0.22), transparent 24%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      overflow: hidden;
    }

    .app {
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
      gap: 12px;
      padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(20px, 5vw, 28px);
      line-height: 1.05;
      letter-spacing: 0.2px;
    }

    .brand p {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .badge {
      flex: 0 0 auto;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .badge .big {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
    }

    .badge .small {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .primary {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white;
    }

    .secondary {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(14px);
    }

    .called-panel {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 12px;
      backdrop-filter: blur(14px);
    }

    .called-top {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .called-input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.12);
      color: white;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }

    .called-input::placeholder {
      color: rgba(255,255,255,0.62);
    }

    .mini-btn {
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      min-width: 84px;
    }

    .chips-wrap {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-height: 92px;
      overflow: auto;
      padding-right: 2px;
    }

    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid var(--chip-border);
      color: white;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .card-wrap {
      min-height: 0;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 780px;
      display: grid;
      grid-template-rows: auto 1fr;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .header-row, .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding: 10px;
    }

    .header-cell {
      text-align: center;
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 900;
      padding: 10px 0;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
      border: 1px solid rgba(255,255,255,0.16);
      letter-spacing: 3px;
    }

    .grid {
      align-content: stretch;
      grid-auto-rows: 1fr;
      min-height: 0;
      padding-top: 0;
    }

    .cell {
      position: relative;
      border: 0;
      border-radius: 18px;
      background: var(--cell);
      color: var(--cell-text);
      font-weight: 900;
      font-size: clamp(18px, 5vw, 34px);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      user-select: none;
      transition: transform .14s ease, box-shadow .14s ease, opacity .14s ease, background .18s ease, color .18s ease;
      box-shadow: inset 0 -4px 0 rgba(15,23,42,0.08);
    }

    .cell:active {
      transform: scale(.97);
    }

    .cell.marked {
      color: white;
      background: var(--marked);
      box-shadow:
        0 10px 20px rgba(239,68,68,.3),
        inset 0 0 0 2px rgba(255,255,255,.18);
      transform: scale(0.97);
      animation: pop 0.2s ease;
    }

    .cell.free {
      color: white;
      background: var(--free);
      font-size: clamp(14px, 4vw, 24px);
      letter-spacing: 1px;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(0.9); }
      100% { transform: scale(0.97); }
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
      padding: 0 4px;
      flex-wrap: wrap;
    }

    .legend {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      display: inline-block;
    }

    .dot.free {
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    .win-banner {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(2, 6, 23, 0.68);
      backdrop-filter: blur(10px);
      z-index: 20;
      padding: 20px;
    }

    .win-box {
      width: min(92vw, 420px);
      background: linear-gradient(160deg, rgba(30,58,138,0.96), rgba(15,23,42,0.96));
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 26px 20px;
      text-align: center;
    }

    .win-box h2 {
      margin: 0;
      font-size: 36px;
    }

    .win-box p {
      color: var(--muted);
      margin: 10px 0 20px;
    }

    @media (min-width: 768px) {
      .app {
        gap: 16px;
        padding: 20px;
      }

      .controls {
        grid-template-columns: 220px 220px;
        justify-content: center;
      }

      .header-row, .grid {
        gap: 10px;
        padding: 14px;
      }

      .grid {
        padding-top: 0;
      }

      .called-top {
        grid-template-columns: 1fr 120px 120px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <h1>17 ปี สผอ.สส.ทหาร</h1>
        <img src="logo.png" style="width:80px;margin-top:10px;">
        <p>แตะเลขบนการ์ดได้ทันที • เต็มจอมือถือ • พร้อมใช้งานในงานจริง</p>
      </div>
      <div class="badge">
        <div class="big" id="markCount">1</div>
        <div class="small">แต้มที่เลือก</div>
      </div>
    </div>

    <div class="controls">
      <button class="primary" id="newCardBtn">สุ่มการ์ดใหม่</button>
      <button class="secondary" id="resetBtn">ล้างเครื่องหมาย</button>
    </div>

    <div class="called-panel">
      <div class="called-top">
        <input id="calledInput" class="called-input" type="text" placeholder="ใส่เลขที่ออก เช่น B12 หรือ 12">
        <button class="primary mini-btn" id="addCalledBtn">เพิ่มเลข</button>
        <button class="secondary mini-btn" id="clearCalledBtn">ล้างรายการ</button>
      </div>
      <div class="chips-wrap" id="calledList"></div>
    </div>

    <div class="card-wrap">
      <div class="card">
        <div class="header-row">
          <div class="header-cell">B</div>
          <div class="header-cell">I</div>
          <div class="header-cell">N</div>
          <div class="header-cell">G</div>
          <div class="header-cell">O</div>
        </div>
        <div class="grid" id="grid"></div>
      </div>
    </div>

    <div class="footer">
      <div class="legend">
        <span class="dot"></span> กดแล้ว
        <span class="dot free"></span> FREE
      </div>
      <div id="statusText">พร้อมเล่น</div>
    </div>
  </div>

  <div class="win-banner" id="winBanner">
    <div class="win-box">
      <h2>🎉 BINGO</h2>
      <p id="winText">คุณได้ครบ 1 แนวแล้ว ตรวจสอบกับผู้ควบคุมเกมได้เลย</p>
      <button class="primary" id="closeWinBtn">ปิดหน้าต่าง</button>
    </div>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const markCount = document.getElementById('markCount');
    const statusText = document.getElementById('statusText');
    const winBanner = document.getElementById('winBanner');
    const winText = document.getElementById('winText');
    const calledInput = document.getElementById('calledInput');
    const calledList = document.getElementById('calledList');

    const ranges = [
      [1, 15],
      [16, 30],
      [31, 45],
      [46, 60],
      [61, 75]
    ];

    let cells = [];
    let calledNumbers = [];

    function sampleRange(min, max, count) {
      const nums = [];
      for (let i = min; i <= max; i++) nums.push(i);
      for (let i = nums.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [nums[i], nums[j]] = [nums[j], nums[i]];
      }
      return nums.slice(0, count);
    }

    function buildCard() {
      grid.innerHTML = '';
      cells = [];
      const cols = ranges.map(([min, max]) => sampleRange(min, max, 5));

      for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 5; col++) {
          const btn = document.createElement('button');
          btn.className = 'cell';
          btn.type = 'button';
          btn.dataset.row = row;
          btn.dataset.col = col;

          if (row === 2 && col === 2) {
            btn.textContent = 'FREE';
            btn.classList.add('free', 'marked');
            btn.dataset.marked = 'true';
            btn.dataset.value = 'FREE';
          } else {
            btn.textContent = cols[col][row];
            btn.dataset.marked = 'false';
            btn.dataset.value = cols[col][row];
          }

          btn.addEventListener('click', () => toggleCell(btn));
          grid.appendChild(btn);
          cells.push(btn);
        }
      }

      updateCounters();
      statusText.textContent = 'สุ่มการ์ดใหม่แล้ว';
    }

    function toggleCell(btn) {
      const isMarked = btn.dataset.marked === 'true';
      btn.dataset.marked = isMarked ? 'false' : 'true';
      btn.classList.toggle('marked', !isMarked);

      updateCounters();

      const bingoType = checkBingo();
      if (bingoType) {
        winText.textContent = `คุณได้ Bingo แบบ ${bingoType} แล้ว ตรวจสอบกับผู้ควบคุมเกมได้เลย`;
        winBanner.style.display = 'flex';
        statusText.textContent = `พบ Bingo แบบ ${bingoType}`;
      } else {
        statusText.textContent = 'กำลังเล่น';
      }
    }

    function resetMarks() {
      cells.forEach(btn => {
        const isFree = btn.classList.contains('free');
        btn.dataset.marked = isFree ? 'true' : 'false';
        btn.classList.toggle('marked', isFree);
      });
      updateCounters();
      statusText.textContent = 'ล้างเครื่องหมายแล้ว';
    }

    function updateCounters() {
      const count = cells.filter(c => c.dataset.marked === 'true').length;
      markCount.textContent = count;
    }

    function markedAt(row, col) {
      return cells.find(c => +c.dataset.row === row && +c.dataset.col === col)?.dataset.marked === 'true';
    }

    function checkBingo() {
      for (let r = 0; r < 5; r++) {
        if ([0,1,2,3,4].every(c => markedAt(r, c))) {
          return `แนวนอน แถวที่ ${r + 1}`;
        }
      }

      for (let c = 0; c < 5; c++) {
        if ([0,1,2,3,4].every(r => markedAt(r, c))) {
          return `แนวตั้ง คอลัมน์ ${['B','I','N','G','O'][c]}`;
        }
      }

      if ([0,1,2,3,4].every(i => markedAt(i, i))) {
        return 'แนวทแยง ซ้ายบนไปขวาล่าง';
      }

      if ([0,1,2,3,4].every(i => markedAt(i, 4 - i))) {
        return 'แนวทแยง ขวาบนไปซ้ายล่าง';
      }

      const outerCorners = [
        [0,0], [0,4], [4,0], [4,4]
      ];
      if (outerCorners.every(([r, c]) => markedAt(r, c))) {
        return 'สี่มุมนอก';
      }

      const innerCorners = [
        [1,1], [1,3], [3,1], [3,3]
      ];
      if (innerCorners.every(([r, c]) => markedAt(r, c))) {
        return 'สี่มุมใน';
      }

      return null;
    }

    function normalizeCalledValue(value) {
      if (!value) return null;
      let text = value.toString().trim().toUpperCase();

      // รองรับ B12 / B-12 / 12
      text = text.replace(/\s+/g, '');
      const match = text.match(/^([BINGO])?-?(\d{1,2})$/);

      if (!match) return null;

      const num = parseInt(match[2], 10);
      if (num < 1 || num > 75) return null;

      let prefix = '';
      if (num >= 1 && num <= 15) prefix = 'B';
      else if (num >= 16 && num <= 30) prefix = 'I';
      else if (num >= 31 && num <= 45) prefix = 'N';
      else if (num >= 46 && num <= 60) prefix = 'G';
      else if (num >= 61 && num <= 75) prefix = 'O';

      return `${prefix}${num}`;
    }

    function renderCalledList() {
      calledList.innerHTML = '';
      calledNumbers.forEach(item => {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.textContent = item;
        calledList.appendChild(chip);
      });
    }

    function addCalledNumber() {
      const normalized = normalizeCalledValue(calledInput.value);
      if (!normalized) {
        statusText.textContent = 'รูปแบบเลขไม่ถูกต้อง';
        return;
      }

      if (!calledNumbers.includes(normalized)) {
        calledNumbers.push(normalized);
        renderCalledList();
        statusText.textContent = `เพิ่มเลข ${normalized} แล้ว`;
      } else {
        statusText.textContent = `${normalized} มีอยู่แล้ว`;
      }

      calledInput.value = '';
      calledInput.focus();
    }

    function clearCalledNumbers() {
      calledNumbers = [];
      renderCalledList();
      statusText.textContent = 'ล้างรายการเลขที่ออกแล้ว';
    }

    document.getElementById('newCardBtn').addEventListener('click', buildCard);
    document.getElementById('resetBtn').addEventListener('click', resetMarks);
    document.getElementById('closeWinBtn').addEventListener('click', () => {
      winBanner.style.display = 'none';
    });

    document.getElementById('addCalledBtn').addEventListener('click', addCalledNumber);
    document.getElementById('clearCalledBtn').addEventListener('click', clearCalledNumbers);

    calledInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addCalledNumber();
    });

    buildCard();
  </script>
</body>
</html>
